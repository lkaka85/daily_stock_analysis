name: 自动运行股票分析

# 触发方式：手动点运行 + 每天凌晨自动运行（北京时间）
on:
  workflow_dispatch:  # 手动触发（测试用）
  schedule:
    - cron: '0 16 * * *'  # 北京时间每天0点运行（不用改）

jobs:
  run_analysis:
    runs-on: ubuntu-latest
    steps:
      # 1. 下载仓库代码
      - name: 下载代码
        uses: actions/checkout@v4

      # 2. 配置Python环境
      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装项目依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 运行分析脚本（如果项目入口不是main.py，改这里）
      - name: 运行脚本
        run: python main.py
